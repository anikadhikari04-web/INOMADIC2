kind = "web"
previewPath = "/"
title = "INOMADIC"
version = "1.0.0"
id = "artifacts/inomadic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19240

[services.development]
run = "pnpm --filter @workspace/inomadic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inomadic", "run", "build" ]
publicDir = "artifacts/inomadic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19240"
BASE_PATH = "/"
